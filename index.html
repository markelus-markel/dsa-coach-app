<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7A2331">
<title>Digital Strong Abay — Тренер</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDE7DC;
    --surface:#F7F3EA;
    --surface-raised:#FFFFFF;
    --ink:#211B16;
    --ink-muted:#6B5F52;
    --hairline:#D9CFBC;
    --red:#B6332E;
    --red-dark:#8C2622;
    --blue:#2C4A6E;
    --gold:#A9802E;
    --teal:#3F7D72;
    --present:#4D6B4A;
    --late:#B8893B;
    --excused:#5C7A93;
    --sick:#7C6E63;
    --absent:#B6332E;
    --radius:14px;
    --radius-sm:8px;
    --shadow:0 1px 2px rgba(33,27,22,.06), 0 4px 14px rgba(33,27,22,.07);
    --font-display:'Oswald', 'Arial Narrow', sans-serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button{font-family:inherit;}
  ::selection{background:var(--gold); color:#fff;}
  :focus-visible{outline:2px solid var(--blue); outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }

  /* Desktop preview convenience: center as a phone-width column.
     On a real Android phone (display:standalone) this rule simply never matches. */
  @media (min-width:480px){
    body{ background:#3A332B; }
    #shell{
      max-width:412px; margin:24px auto; min-height:calc(100vh - 48px);
      box-shadow:0 20px 60px rgba(0,0,0,.35); border-radius:28px; overflow:hidden;
    }
  }

  #shell{ background:var(--bg); min-height:100vh; display:flex; flex-direction:column; position:relative; }

  .app-bar{
    background:var(--surface); border-bottom:1px solid var(--hairline);
    padding:14px 16px; display:flex; align-items:center; gap:10px;
    position:sticky; top:0; z-index:5;
  }
  .app-bar h1{
    font-family:var(--font-display); font-size:18px; font-weight:600; letter-spacing:.2px;
    margin:0; flex:1; text-transform:uppercase;
  }
  .back-btn{
    background:none; border:none; font-size:20px; color:var(--ink); cursor:pointer;
    width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    border-radius:50%;
  }
  .back-btn:active{ background:var(--hairline); }
  .net-pill{
    font-family:var(--font-body); font-size:11px; font-weight:600; padding:5px 10px;
    border-radius:999px; cursor:pointer; border:1px solid transparent; user-select:none;
    display:flex; align-items:center; gap:5px;
  }
  .net-pill.online{ background:rgba(77,107,74,.12); color:var(--present); }
  .net-pill.offline{ background:rgba(182,51,46,.12); color:var(--red); }
  .net-dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }

  .content{ flex:1; overflow-y:auto; padding:16px; padding-bottom:84px; }

  .sync-banner{
    background:var(--red-dark); color:#F7F3EA; font-size:12.5px; font-weight:500;
    padding:9px 16px; display:flex; align-items:center; gap:8px;
  }

  /* Card with signature "corner-flag" accent strip */
  .card{
    background:var(--surface-raised); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:14px 14px 14px 18px; margin-bottom:12px; position:relative; overflow:hidden;
  }
  .card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
    background:var(--flag, var(--blue)); transition:background .25s ease;
  }
  .card.flag-red{ --flag:var(--red); }
  .card.flag-blue{ --flag:var(--blue); }
  .card.flag-gold{ --flag:var(--gold); }
  .card.flag-muted{ --flag:var(--hairline); }

  .eyebrow{ font-size:11px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:.06em; font-weight:600; margin:0 0 3px; }
  .card h3{ font-family:var(--font-display); font-size:16.5px; font-weight:600; margin:0 0 4px; }
  .card p.meta{ font-size:13px; color:var(--ink-muted); margin:0; }

  .stat-row{ display:flex; gap:10px; margin-bottom:16px; }
  .stat{ flex:1; background:var(--surface-raised); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; text-align:center; }
  .stat .num{ font-family:var(--font-display); font-size:26px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--red-dark); }
  .stat .lbl{ font-size:11.5px; color:var(--ink-muted); margin-top:2px; }

  .section-title{ font-family:var(--font-display); font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-muted); margin:18px 2px 8px; font-weight:600; }

  .btn{
    border:none; border-radius:var(--radius-sm); padding:13px 18px; font-weight:600; font-size:14.5px;
    cursor:pointer; width:100%; transition:transform .08s ease, opacity .15s ease;
  }
  .btn:active{ transform:scale(.985); }
  .btn-primary{ background:var(--red); color:#F7F3EA; }
  .btn-primary:hover{ background:var(--red-dark); }
  .btn-ghost{ background:transparent; color:var(--blue); border:1.5px solid var(--blue); }
  .btn-secondary{ background:var(--surface); color:var(--ink); border:1.5px solid var(--hairline); }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; color:var(--ink-muted); margin-bottom:6px; font-weight:500; }
  .field input{
    width:100%; padding:13px 14px; border-radius:var(--radius-sm); border:1.5px solid var(--hairline);
    font-size:15px; font-family:inherit; background:var(--surface-raised); color:var(--ink);
  }
  .field input:focus{ border-color:var(--blue); outline:none; }

  .login-hero{ text-align:center; padding:48px 8px 28px; }
  .login-hero .corner-mark{
    width:54px; height:54px; margin:0 auto 18px; border-radius:14px; background:var(--red);
    display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  }
  .login-hero .corner-mark::after{
    content:''; position:absolute; right:0; bottom:0; width:0; height:0;
    border-left:24px solid transparent; border-bottom:24px solid var(--blue);
  }
  .login-hero .corner-mark svg{ width:24px; height:24px; fill:var(--surface); position:relative; z-index:2; }
  .login-hero h1{ font-family:var(--font-display); font-size:21px; text-transform:uppercase; margin:0 0 4px; letter-spacing:.3px; }
  .login-hero p{ font-size:13.5px; color:var(--ink-muted); margin:0; line-height:1.5; }

  .roster-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--surface-raised); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px;
    box-shadow:var(--shadow);
  }
  .roster-item .name{ font-size:14.5px; font-weight:600; }
  .roster-item .weight{ font-size:12px; color:var(--ink-muted); }
  .chev{ color:var(--ink-muted); font-size:16px; }

  .legend{ display:flex; flex-wrap:wrap; margin-bottom:14px; font-size:11.5px; color:var(--ink-muted); }
  .legend span{ display:flex; align-items:center; margin-right:12px; margin-bottom:4px; }
  .legend i{ width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:5px; }

  .disc-badge{ display:inline-flex; padding:3px 9px; border-radius:999px; font-size:10.5px; font-weight:700; letter-spacing:.01em; }

  .filter-row{ display:flex; flex-wrap:wrap; margin-bottom:14px; }
  .filter-pill{
    background:var(--surface-raised); border:1.5px solid var(--hairline); color:var(--ink-muted);
    font-size:12px; font-weight:600; padding:7px 12px; border-radius:999px;
    margin-right:8px; margin-bottom:8px; cursor:pointer;
  }
  .filter-pill.active{ background:var(--ink); color:var(--surface); border-color:var(--ink); }

  .signal-row{ display:flex; align-items:flex-start; padding:10px 0; }
  .signal-row + .signal-row{ border-top:1px solid var(--hairline); }
  .signal-dot{ width:8px; height:8px; border-radius:50%; margin-top:4px; margin-right:10px; flex-shrink:0; }
  .signal-text{ font-size:13px; line-height:1.4; }

  .att-row{ background:var(--surface-raised); border-radius:var(--radius); box-shadow:var(--shadow); padding:12px 14px; margin-bottom:10px; position:relative; overflow:hidden; }
  .att-row::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--flag, var(--hairline)); transition:background .2s; }
  .att-row .name{ font-weight:600; font-size:14.5px; margin-bottom:2px; }
  .att-row .weight{ font-size:12px; color:var(--ink-muted); margin-bottom:10px; }
  .stamp-grid{ display:flex; }
  .stamp{
    flex:1 1 0; margin-right:6px;
    border:1.5px solid var(--hairline); background:var(--surface); border-radius:8px;
    padding:8px 2px; font-size:10.5px; font-weight:600; text-align:center; cursor:pointer; color:var(--ink-muted);
    line-height:1.15;
  }
  .stamp:last-child{ margin-right:0; }
  .stamp.active{ color:#fff; border-color:transparent; }
  .stamp[data-s="present"].active{ background:var(--present); }
  .stamp[data-s="late"].active{ background:var(--late); }
  .stamp[data-s="excused"].active{ background:var(--excused); }
  .stamp[data-s="sick"].active{ background:var(--sick); }
  .stamp[data-s="absent"].active{ background:var(--absent); }

  .bottom-nav{
    position:fixed; left:0; right:0; bottom:0; max-width:412px; margin:0 auto;
    background:var(--surface-raised); border-top:1px solid var(--hairline);
    display:flex; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:6;
  }
  @media (max-width:479px){ .bottom-nav{ max-width:none; } }
  .nav-btn{
    flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column;
    align-items:center; gap:3px; padding:6px 0; color:var(--ink-muted); font-size:11px; font-weight:600;
  }
  .nav-btn.active{ color:var(--red-dark); }
  .nav-btn svg{ width:20px; height:20px; }

  .toast{
    position:fixed; left:16px; right:16px; bottom:78px; max-width:380px; margin:0 auto;
    background:var(--ink); color:var(--surface); padding:12px 16px; border-radius:10px;
    font-size:13.5px; box-shadow:var(--shadow); z-index:20; opacity:0; transform:translateY(8px);
    transition:opacity .2s, transform .2s;
  }
  .toast.show{ opacity:1; transform:translateY(0); }

  .empty{ text-align:center; padding:40px 16px; color:var(--ink-muted); }
  .empty .flag-mini{ width:30px; height:30px; margin:0 auto 10px; background:var(--hairline); border-radius:8px; }

  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(20,16,12,.5); z-index:30;
    opacity:0; transition:opacity .2s ease;
  }
  .sheet-backdrop.show{ opacity:1; }
  .sheet{
    position:fixed; left:0; right:0; bottom:0; max-width:412px; margin:0 auto;
    background:var(--surface-raised); border-radius:20px 20px 0 0;
    padding:18px 18px calc(20px + env(safe-area-inset-bottom));
    z-index:31; max-height:78vh; overflow-y:auto;
    transform:translateY(100%); transition:transform .25s ease;
    box-shadow:0 -8px 30px rgba(0,0,0,.22);
  }
  .sheet.show{ transform:translateY(0); }
  .sheet-handle{ width:36px; height:4px; background:var(--hairline); border-radius:999px; margin:0 auto 14px; }

  .assist-tile{ flex:1; text-align:center; cursor:pointer; padding:16px 6px; }
  .assist-tile svg{ width:21px; height:21px; margin:0 auto 7px; display:block; color:var(--ink-muted); }
  .assist-tile .t{ font-size:12px; font-weight:600; }
  .assist-tile .s{ font-size:10px; color:var(--ink-muted); margin-top:2px; letter-spacing:.04em; text-transform:uppercase; }
  .assist-row{ display:flex; margin-bottom:8px; }
  .assist-row > .assist-tile{ margin-right:8px; }
  .assist-row > .assist-tile:last-child{ margin-right:0; }

  .mic-btn{
    width:64px; height:64px; border-radius:50%; border:none; cursor:pointer;
    background:var(--red); color:#fff; display:inline-flex; align-items:center; justify-content:center;
  }
  .mic-btn svg{ width:26px; height:26px; }
  .mic-btn.listening{ background:var(--teal); animation:micPulse 1.2s ease-in-out infinite; }
  @keyframes micPulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(63,125,114,.45); }
    50%{ box-shadow:0 0 0 14px rgba(63,125,114,0); }
  }
</style>
</head>
<body>
<div id="shell"></div>

<script>
/* =========================================================
   DEMO-ДАННЫЕ (подмножество seed_data.sql, 3 тренера = 3 секции)
   ========================================================= */
const TODAY = '2026-06-25'; // зафиксировано для прототипа

const COACHES = [
  { id:1, name:'Жумабеков Ерлан Канатович', phone:'+7 701 111 0001', section:'СШ №1, г. Семей' },
  { id:2, name:'Ахметов Дамир Серикович',   phone:'+7 701 111 0002', section:'СШ №2, г. Аягоз' },
  { id:3, name:'Турсунова Айгуль Касымовна', phone:'+7 701 111 0003', section:'СШ №3, г. Шар' },
];
/* ---------------------------------------------------------
   Канонический порядок дисциплин для ВСЕХ списков, фильтров и счётчиков:
   1. Греко-римская  2. Вольная  3. Женская — НЕ алфавит и не порядок
   добавления в БД, а порядок, в котором Федерация описывает разделы.
   sortByDiscipline — единая точка применения, чтобы порядок не зависел
   от того, в каком порядке группы лежат в источнике данных.
   --------------------------------------------------------- */
const DISCIPLINE_ORDER = ['greco_roman', 'freestyle', 'women_wrestling'];
function sortByDiscipline(groups){
  return [...groups].sort((a,b)=>DISCIPLINE_ORDER.indexOf(a.competition_discipline) - DISCIPLINE_ORDER.indexOf(b.competition_discipline));
}
function currentCoach(){ return COACHES.find(c=>c.id===state.coachId) || COACHES[0]; }
function myGroups(){ return sortByDiscipline(GROUPS.filter(g=>g.coachId===state.coachId)); }
function myGroupsOf(coachId){ return sortByDiscipline(GROUPS.filter(g=>g.coachId===coachId)); }

/* ---------------------------------------------------------
   Словари — дисциплина / правила / гендерный дивизион / программа.
   Намеренно 4 отдельных измерения, а не одно "discipline":
   competition_discipline и rule_family расходятся для женской
   борьбы (правила те же, что у freestyle, но дисциплина — своя),
   а program_stream — это не дисциплина и не правила, а трек
   развития спортсмена внутри Федерации.

   women_wrestling сознательно поддерживает ДВЕ rule_family:
   - freestyle_rules — основной соревновательный вариант (массовый набор);
   - greco_roman_rules — опциональная/локальная группа, если секция
     реально ведёт такую подготовку (см. group id:5 ниже — это не
     гипотетический кейс в комментарии, а реальная mock-группа,
     которая рендерится и фильтруется как обычная женская группа).
   --------------------------------------------------------- */
const DISCIPLINE_LABEL = {
  greco_roman:'Греко-римская борьба',
  freestyle:'Вольная борьба',
  women_wrestling:'Женская борьба / Қыздар күресі',
};
const RULE_FAMILY_LABEL = { greco_roman_rules:'Правила греко-римской борьбы', freestyle_rules:'Правила вольной борьбы' };
const GENDER_DIVISION_LABEL = { male:'Юноши', female:'Девушки', mixed_youth:'Смешанная группа' };
const PROGRAM_STREAM_LABEL = {
  mass:'Массовый спорт', reserve:'Спортивный резерв', regional_team:'Сборная области',
  women_development:'Қыздар күресі · программа развития',
};

// Акценты дисциплин: греко-римская = steel-blue, вольная = красный
// (существующий бренд-цвет), женская борьба = отдельный teal —
// сознательно НЕ переиспользуем gold (он уже занят как генерик-акцент
// профиля/карточек), чтобы женская борьба не выглядела как "ещё один оттенок",
// а читалась как самостоятельный контур. Цвет идёт за competition_discipline,
// а не за rule_family — локальная женская греко-группа (id:5) всё равно teal,
// а не синяя, потому что для Федерации это женская борьба, а не греко-римская.
const DISCIPLINE_COLORS = {
  greco_roman:     { hex:'#2C4A6E', tint:'rgba(44,74,110,.12)',  cssVar:'var(--blue)' },
  freestyle:       { hex:'#B6332E', tint:'rgba(182,51,46,.12)',  cssVar:'var(--red)'  },
  women_wrestling: { hex:'#3F7D72', tint:'rgba(63,125,114,.14)', cssVar:'var(--teal)' },
};

function getDisciplineAccent(group){ return DISCIPLINE_COLORS[group.competition_discipline].cssVar; }
function getDisciplineBadge(group){
  const c = DISCIPLINE_COLORS[group.competition_discipline];
  return `<span class="disc-badge" style="background:${c.tint};color:${c.hex}">${DISCIPLINE_LABEL[group.competition_discipline]}</span>`;
}
// "Ведущая метрика" карточки группы — у каждой дисциплины разный приоритет
// сигнала: женская борьба ведёт с согласиями (доверие родителей важнее процента
// посещаемости на этом этапе), резерв/сборная ведёт с турниром, массовый спорт —
// с посещаемостью. Иерархия специально захардкожена здесь, а не "вообще все метрики
// одной строкой", чтобы карточка не превращалась в дашборд.
function getDisciplineMeta(group){
  if(group.competition_discipline === 'women_wrestling'){
    const missing = group.athletes.filter(id=>ATHLETES[id].consentStatus==='missing').length;
    return missing>0 ? `${missing} без согласия родителя` : 'все согласия активны';
  }
  if(group.nextTournamentInDays != null) return `1 турнир через ${group.nextTournamentInDays} дней`;
  if(group.mockAttendanceRate != null) return `посещаемость ${group.mockAttendanceRate}%`;
  return '';
}
function weightRangeOf(group){
  const ws = group.athletes.map(id=>ATHLETES[id].currentWeight);
  return `${Math.min(...ws)}–${Math.max(...ws)} кг`;
}
function athleteNoun(group){ return group.gender_division==='female' ? 'спортсменок' : 'спортсменов'; }

const GROUPS = [
  // 1. Греко-римская борьба — базовый раздел
  { id:3, coachId:2, name:'Греко-римская борьба 13–15', ageCategory:'13–15',
    competition_discipline:'greco_roman', rule_family:'greco_roman_rules', gender_division:'male', program_stream:'reserve',
    nextTournamentInDays:12, athletes:[8,9,10,11,12,13,14] },
  // 2. Вольная борьба — базовый раздел
  { id:1, coachId:1, name:'Вольная борьба 11–13 (юноши)', ageCategory:'11–13',
    competition_discipline:'freestyle', rule_family:'freestyle_rules', gender_division:'male', program_stream:'mass',
    mockAttendanceRate:82, athletes:[1,2,3,4,5] },
  { id:4, coachId:3, name:'Вольная борьба 10–12 (начальная)', ageCategory:'10–12',
    competition_discipline:'freestyle', rule_family:'freestyle_rules', gender_division:'male', program_stream:'mass',
    mockAttendanceRate:90, athletes:[6,7] },
  // 3. Женская борьба — отдельный программный контур (две rule_family: основная freestyle и опциональная greco)
  { id:2, coachId:1, name:'Женская борьба 12–14', ageCategory:'12–14',
    competition_discipline:'women_wrestling', rule_family:'freestyle_rules', gender_division:'female', program_stream:'women_development',
    athletes:[15,16,17,18,19,20] },
  { id:5, coachId:2, name:'Женская борьба 13–15 (греко-стиль)', ageCategory:'13–15',
    competition_discipline:'women_wrestling', rule_family:'greco_roman_rules', gender_division:'female', program_stream:'women_development',
    athletes:[21,22] },
];

const ATHLETES = {
  1:{name:'Сатпаев Алихан', gender:'male', birthYear:2014, currentWeight:34, consentStatus:'active', status:'mass'},
  2:{name:'Сатпаев Дамир', gender:'male', birthYear:2015, currentWeight:30, consentStatus:'active', status:'mass'},
  3:{name:'Касымов Тимур', gender:'male', birthYear:2013, currentWeight:38, consentStatus:'active', status:'mass'},
  4:{name:'Касымов Алмас', gender:'male', birthYear:2016, currentWeight:28, consentStatus:'active', status:'mass'},
  5:{name:'Омаров Санжар', gender:'male', birthYear:2014, currentWeight:34, consentStatus:'active', status:'mass'},

/* ---------------------------------------------------------
   "Сигналы по дисциплинам" на дашборде тренера — по одному
   приоритетному сигналу на группу (consent-гэп > турнир > сегодняшняя
   тренировка > посещаемость). Computed из тех же mock-полей, что
   видны в карточках — не отдельный источник правды.

   Project Office relevance (не строим отдельный дашборд сейчас,
   но именно эта дифференциация — competition_discipline / gender_division /
   program_stream / consentStatus — это ровно тот набор измерений,
   по которому Федерация в MVP-2 сможет агрегированно считать:
   сколько спортсменов по дисциплинам, сколько девочек в женской борьбе,
   где растёт греко-римская/вольная, где не хватает тренеров,
   где проблемы с согласиями родителей, где формируется резерв/сборная.
   Это ровно Section_KPI_Snapshot / Women_Wrestling_Statistics_Snapshot
   из Architecture Baseline v0.9 — здесь они просто еще не материализованы.) */
function getKeySignalForGroup(g){
  if(g.competition_discipline==='women_wrestling'){
    const missing = g.athletes.filter(id=>ATHLETES[id].consentStatus==='missing').length;
    if(missing>0) return { accent:getDisciplineAccent(g), text:`${DISCIPLINE_LABEL[g.competition_discipline]}: ${missing} спортсменки без согласия родителя` };
  }
  if(g.nextTournamentInDays!=null){
    return { accent:getDisciplineAccent(g), text:`${DISCIPLINE_LABEL[g.competition_discipline]}: ближайший турнир через ${g.nextTournamentInDays} дней` };
  }
  const todayCount = SESSIONS.filter(s=>s.groupId===g.id && s.date===TODAY).length;
  if(todayCount>0){
    return { accent:getDisciplineAccent(g), text:`${DISCIPLINE_LABEL[g.competition_discipline]}: сегодня ${todayCount} тренировка` };
  }
  if(g.mockAttendanceRate!=null){
    return { accent:getDisciplineAccent(g), text:`${DISCIPLINE_LABEL[g.competition_discipline]}: посещаемость ${g.mockAttendanceRate}%` };
  }
  return null;
}
function disciplineSignals(groups){ return groups.map(getKeySignalForGroup).filter(Boolean); }

/* =========================================================
   DB-МОДУЛЬ — единая точка доступа к данным для ассистента.
   Сейчас это просто фасад над GROUPS/ATHLETES/COACHES/SESSIONS
   (никакого отдельного хранилища не появляется — источник правды
   один, как и был). Смысл модуля — не хранение, а ОДНА точка,
   через которую что угодно (ассистент, будущий поиск, будущий
   реальный backend-эндпоинт) задаёт вопрос и получает ответ,
   не зная, как именно данные устроены внутри.

   DB.search() — простой keyword-matching, НЕ LLM и не выдаётся
   за него: честный rule-based поиск по тем же mock-данным, что
   рисуют карточки в приложении. Сюда в будущем подключается
   реальный backend-поиск/LLM без изменения вызывающего кода.

   ВАЖНО (privacy): анонимный посетитель лендинга (state.authed=false)
   не получает ответы по согласиям/медоданным — это ровно тот же
   принцип RBAC, что и во всём остальном приложении, просто
   применённый к новому каналу (ассистенту), а не только к экранам.
   ========================================================= */
const DB = {
  groups: GROUPS,
  athletes: ATHLETES,
  coaches: COACHES,
  sessions: SESSIONS,

  faq: [
    { k:['как отметить посещаемость','отметить посещаемость'],
      a:'Откройте группу → «Отметить посещаемость» у нужного занятия → выберите статус каждому спортсмену → «Сохранить посещаемость».' },
    { k:['как зачислить','добавить спортсмена','новый спортсмен'],
      a:'Зачисление в группу делает администратор/проектный офис — в этом прототипе состав групп фиксирован демо-данными.' },
    { k:['как подать заявку','заявка на турнир','подать заявку'],
      a:'Подача заявок на турнир — в следующей версии приложения, раздел «Турниры» сейчас в разработке.' },
  ],

  disciplineCopy: {
    greco_roman:'Греко-римская борьба — классическая школа: корпус, броски, дисциплина. Базовый раздел Федерации, спортивный резерв.',
    freestyle:'Вольная борьба — динамика, проходы в ноги, мобильность. Самая массовая база Федерации.',
    women_wrestling:'Женская борьба — отдельный программный контур: набор, удержание, безопасная среда, родительское доверие, свои тренеры и турниры.',
  },

  search(query){
    const q = (query||'').toLowerCase().trim();
    if(!q) return { answer:'Сначала продиктуйте или напечатайте вопрос.', source:null };

    for(const item of this.faq){
      if(item.k.some(key=>q.includes(key))) return { answer:item.a, source:'FAQ' };
    }
    if(/греко.?рим/.test(q)) return { answer:this.disciplineCopy.greco_roman, source:'DB.disciplineCopy' };
    if(/вольн/.test(q))      return { answer:this.disciplineCopy.freestyle, source:'DB.disciplineCopy' };
    if(/женск|қызд/.test(q)) return { answer:this.disciplineCopy.women_wrestling, source:'DB.disciplineCopy' };

    const scopedGroups = state.authed ? myGroups() : GROUPS;
    const scopeLabel = state.authed ? 'у вас' : 'всего в Федерации (демо-данные)';

    if(/сколько.*групп/.test(q)){
      return { answer:`Сейчас ${scopeLabel} ${scopedGroups.length} ${scopedGroups.length===1?'группа':'групп'}.`, source:'DB.groups' };
    }
    if(/сколько.*спортсмен/.test(q)){
      const n = scopedGroups.reduce((s,g)=>s+g.athletes.length,0);
      return { answer:`Сейчас ${scopeLabel} ${n} спортсменов.`, source:'DB.athletes' };
    }
    if(/турнир/.test(q)){
      const withT = scopedGroups.filter(g=>g.nextTournamentInDays!=null);
      return { answer: withT.length ? withT.map(g=>`${g.name}: турнир через ${g.nextTournamentInDays} дней`).join('; ') : 'Запланированных турниров не нашёл.', source:'DB.groups.nextTournamentInDays' };
    }
    if(/посещаем/.test(q)){
      const withA = scopedGroups.filter(g=>g.mockAttendanceRate!=null);
      return { answer: withA.length ? withA.map(g=>`${g.name}: ${g.mockAttendanceRate}%`).join('; ') : 'Нет данных по посещаемости для этого набора групп.', source:'DB.groups.mockAttendanceRate' };
    }
    if(/согласи/.test(q)){
      if(!state.authed) return { answer:'Это закрытые данные о спортсменах — войдите как тренер, чтобы получить ответ.', source:null };
      const missing = scopedGroups.flatMap(g=>g.athletes).filter(id=>ATHLETES[id].consentStatus==='missing');
      return { answer: missing.length ? `${missing.length} спортсмен(ов) без активного согласия родителя в ваших группах.` : 'У всех ваших спортсменов активные согласия.', source:'DB.athletes.consentStatus' };
    }

    return { answer:'Не нашёл точного ответа в данных приложения. Попробуйте переформулировать вопрос или откройте раздел «Группы».', source:null };
  },
};

/* ---------------------------------------------------------
   Bottom-sheet оверлей — единый механизм для меню, карточек дисциплин
   и честных "скоро" заглушек voice/AI-ассистента. Контент-генераторы
   ниже возвращают только внутренний HTML; рамку (handle + крестик)
   достраивает openSheet().
   --------------------------------------------------------- */
function openSheet(innerHtml){
  closeSheet();
  const backdrop = document.createElement('div');
  backdrop.className = 'sheet-backdrop';
  backdrop.id = 'sheetBackdrop';
  backdrop.onclick = closeSheet;
  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.id = 'sheetPanel';
  sheet.onclick = (e)=>e.stopPropagation();
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <button class="back-btn" style="position:absolute;top:8px;right:10px;font-size:22px;" onclick="closeSheet()" aria-label="Закрыть">×</button>
    ${innerHtml}
  `;
  document.body.appendChild(backdrop);
  document.body.appendChild(sheet);
  requestAnimationFrame(()=>{ backdrop.classList.add('show'); sheet.classList.add('show'); });
}
function closeSheet(){
  const b = document.getElementById('sheetBackdrop'), s = document.getElementById('sheetPanel');
  if(b){ b.classList.remove('show'); setTimeout(()=>b.remove(),200); }
  if(s){ s.classList.remove('show'); setTimeout(()=>s.remove(),200); }
  if(recognitionActive && recognition){ try{ recognition.stop(); }catch(e){} }
}

/* ---------------------------------------------------------
   Голосовой/ИИ-ассистент — РЕАЛЬНАЯ функциональность, не имитация:
   - микрофон подключается через Web Speech API (SpeechRecognition),
     это настоящий доступ к микрофону телефона с системным запросом
     разрешения браузера — обойти или сэмулировать этот диалог нельзя
     и не нужно;
   - ответ ищется через DB.search() — честный keyword-matching по
     mock-данным приложения, а не подключённая LLM.
   ВАЖНО: эта функция работает только в полноценной вкладке браузера
   на HTTPS (после деплоя на GitHub Pages) — во вложенном iframe-превью
   чата доступ к микрофону обычно блокируется песочницей самого iframe,
   это ограничение среды показа, а не баг кода.
   --------------------------------------------------------- */
let recognition = null;
let recognitionActive = false;

function supportsSpeech(){ return !!(window.SpeechRecognition || window.webkitSpeechRecognition); }

function openAssistant(mode){
  const title = mode==='ai' ? 'ИИ-ассистент' : 'Голосовой помощник';
  const intro = mode==='ai'
    ? 'Задайте вопрос голосом или текстом — найду ответ в данных приложения.'
    : 'Нажмите на микрофон и скажите вопрос.';
  openSheet(`
    <h3 style="font-family:var(--font-display);font-size:19px;margin:0 0 4px;">${title}</h3>
    <p style="font-size:13.5px;color:var(--ink-muted);line-height:1.5;margin:0 0 16px;">${intro}</p>
    <div style="text-align:center;margin-bottom:16px;">
      <button id="micBtn" class="mic-btn" onclick="toggleListening()" aria-label="Микрофон">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      </button>
      <div id="micStatus" style="font-size:12px;color:var(--ink-muted);margin-top:8px;">
        ${supportsSpeech() ? 'Нажмите и говорите' : 'Голосовой ввод не поддерживается этим браузером — введите вопрос текстом'}
      </div>
    </div>
    <div class="field">
      <label>Вопрос</label>
      <input id="assistantInput" type="text" placeholder="Например: сколько спортсменов в моей группе?" onkeydown="if(event.key==='Enter')askAssistant()">
    </div>
    <button class="btn btn-primary" onclick="askAssistant()">Спросить</button>
    <div id="assistantAnswer"></div>
  `);
}

function toggleListening(){
  if(!supportsSpeech()){ showToast('Голосовой ввод не поддерживается этим браузером'); return; }
  if(recognitionActive){ try{ recognition.stop(); }catch(e){} return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.interimResults = true;
  recognition.continuous = false;

  const micBtn = document.getElementById('micBtn');
  const status = document.getElementById('micStatus');
  const input = document.getElementById('assistantInput');

  recognition.onstart = () => {
    recognitionActive = true;
    micBtn && micBtn.classList.add('listening');
    if(status) status.textContent = 'Слушаю...';
  };
  recognition.onresult = (e) => {
    let text = '';
    for(let i=0;i<e.results.length;i++) text += e.results[i][0].transcript;
    if(input) input.value = text;
  };
  recognition.onerror = (e) => {
    if(!status) return;
    status.textContent = e.error==='not-allowed'
      ? 'Доступ к микрофону запрещён — разрешите в настройках браузера'
      : 'Не удалось распознать речь — попробуйте ещё раз или введите текстом';
  };
  recognition.onend = () => {
    recognitionActive = false;
    micBtn && micBtn.classList.remove('listening');
    if(status) status.textContent = 'Нажмите и говорите';
  };
  try{ recognition.start(); }catch(err){ showToast('Микрофон недоступен в этом окне'); }
}

function askAssistant(){
  const inputEl = document.getElementById('assistantInput');
  const answerBox = document.getElementById('assistantAnswer');
  const q = inputEl ? inputEl.value.trim() : '';
  if(!q){ showToast('Введите или продиктуйте вопрос'); return; }
  const result = DB.search(q);
  if(answerBox){
    answerBox.innerHTML = `
      <div class="card flag-blue" style="margin-top:14px;">
        <p class="eyebrow">Ответ${result.source?` · ${result.source}`:''}</p>
        <p class="meta" style="color:var(--ink);line-height:1.5;">${result.answer}</p>
      </div>`;
  }
}

/* ---------------------------------------------------------
   Фото/Видео — настоящая нативная камера телефона через
   <input type="file" capture>. Это стандартный HTML, без
   спец-разрешений: на Android открывает реальное приложение камеры.
   Снятый файл остаётся только в памяти браузера (object URL) —
   никуда не загружается. В реальном приложении сюда подключилось бы
   Athlete_Progress_Note/Training_Session как вложение (см. Developer
   Implementation Pack v1.0).
   --------------------------------------------------------- */
function triggerCapture(type){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = type==='photo' ? 'image/*' : 'video/*';
  input.capture = 'environment';
  input.onchange = (e)=>handleCapture(e, type);
  input.click();
}
function handleCapture(event, type){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  openSheet(`
    <h3 style="font-family:var(--font-display);font-size:19px;margin:0 0 10px;">${type==='photo'?'Фото снято':'Видео снято'}</h3>
    ${type==='photo'
      ? `<img src="${url}" style="width:100%;border-radius:12px;margin-bottom:14px;display:block;">`
      : `<video src="${url}" controls style="width:100%;border-radius:12px;margin-bottom:14px;display:block;"></video>`}
    <p style="font-size:13px;color:var(--ink-muted);line-height:1.5;margin:0 0 14px;">
      Демо: файл хранится только в памяти браузера и никуда не загружается.
    </p>
    <span class="disc-badge" style="background:rgba(169,128,46,.16);color:var(--gold)">Прикрепление к занятию — в разработке</span>

    greco_roman: 'Классическая школа борьбы: работа корпусом, броски, высокая дисциплина. Базовый раздел Федерации — преимущественно юношеские группы и спортивный резерв.',

function screenDashboard(){
  const coach = currentCoach();
  const groups = myGroups();
  const athleteCount = groups.reduce((s,g)=>s+g.athletes.length,0);
  const groupIds = groups.map(g=>g.id);
  const todaySessions = SESSIONS.filter(s=>s.date===TODAY && groupIds.includes(s.groupId));
  const signals = disciplineSignals(groups);
  return `
  ${appBar('Сегодня')}
  <div class="content">
    <div class="stat-row">
      <div class="stat"><div class="num">${groups.length}</div><div class="lbl">группы</div></div>
      <div class="stat"><div class="num">${athleteCount}</div><div class="lbl">спортсмена</div></div>
      <div class="stat"><div class="num">${todaySessions.length}</div><div class="lbl">занятий сегодня</div></div>
    </div>

    ${signals.length ? `
    <div class="section-title">Сигналы по дисциплинам</div>
    <div class="card flag-muted">
      ${signals.map(sig=>`<div class="signal-row">
        <span class="signal-dot" style="background:${sig.accent}"></span>
        <span class="signal-text">${sig.text}</span>
      </div>`).join('')}
    </div>` : ''}

    <div class="section-title">Занятия — ${fmtDate(TODAY)}</div>
    ${todaySessions.length ? todaySessions.map(s=>{
      const g = groups.find(g=>g.id===s.groupId);
      return `<div class="card" style="--flag:${getDisciplineAccent(g)};cursor:pointer" onclick="openSession(${s.id})">
        ${getDisciplineBadge(g)}
        <h3 style="margin-top:8px">${g.name}</h3>
        <p class="meta">${s.time} · ${g.athletes.length} ${athleteNoun(g)} в ростере · нажмите, чтобы отметить посещаемость</p>
      </div>`;
    }).join('') : `<div class="empty"><div class="flag-mini"></div>На сегодня занятий не запланировано</div>`}

    <div class="section-title">Мои группы</div>
    ${groups.map(g=>groupCardHTML(g, coach)).join('')}
  </div>
  ${bottomNav()}`;
}

function screenGroups(){

    greco_roman: all.filter(g=>g.competition_discipline==='greco_roman').length,
    freestyle: all.filter(g=>g.competition_discipline==='freestyle').length,
    women_wrestling: all.filter(g=>g.competition_discipline==='women_wrestling').length,

    {key:'all', label:'Все'},
    {key:'greco_roman', label:'Греко-римская'},
    {key:'freestyle', label:'Вольная'},
    {key:'women_wrestling', label:'Женская'},
  ];
  const filtered = state.groupFilter==='all' ? all : all.filter(g=>g.competition_discipline===state.groupFilter);
  return `
  ${appBar('Мои группы')}
  <div class="content">
    <div class="filter-row">
      ${filterDefs.map(f=>`<button class="filter-pill ${state.groupFilter===f.key?'active':''}" onclick="setGroupFilter('${f.key}')">${f.label} · ${counts[f.key]}</button>`).join('')}

function screenAttendance(){
  const s = SESSIONS.find(s=>s.id===state.sessionId);
  const g = GROUPS.find(g=>g.id===s.groupId);
  const draft = state.attendance[s.id] || {};
  const order = ['present','late','excused','sick','absent'];
  const accent = getDisciplineAccent(g);

  return `
  ${appBar('Посещаемость', {back:`openGroup(${g.id})`})}
  <div class="content">
    <div class="card" style="--flag:${accent};margin-bottom:16px;">
      ${getDisciplineBadge(g)}
      <p class="eyebrow" style="margin-top:8px">${fmtDate(s.date)} · ${s.time}</p>
      <h3>${g.name}</h3>
      <p class="meta">${GENDER_DIVISION_LABEL[g.gender_division]} ${g.ageCategory} · отметьте каждого спортсмена, затем сохраните занятие</p>
    </div>

    <div class="legend">
      ${order.map(k=>`<span><i style="background:${STATUS_META[k].color}"></i>${STATUS_META[k].label}</span>`).join('')}
    </div>

    ${g.athletes.map(id=>{
      const a = ATHLETES[id];
      const cur = draft[id];
      return `<div class="att-row" id="att-${id}" style="${cur?`--flag:${STATUS_META[cur].color}`:''}">
        <div class="name">${a.name}</div>
        <div class="weight">${a.currentWeight} кг</div>
        <div class="stamp-grid">
          ${order.map(k=>`<div class="stamp ${cur===k?'active':''}" data-s="${k}" onclick="markAttendance(${s.id},${id},'${k}')">${STATUS_META[k].short}</div>`).join('')}
        </div>
      </div>`;
    }).join('')}

    <button class="btn btn-primary" style="margin-top:8px" onclick="saveAttendance(${s.id})">
      Сохранить посещаемость
    </button>
  </div>`;
}

function screenProfile(){
  const coach = currentCoach();
  return `
  ${appBar('Профиль', {hideNet:true})}
  <div class="content">
    <div class="card flag-gold">
      <p class="eyebrow">Тренер · ${coach.section}</p>
      <h3>${coach.name}</h3>
      <p class="meta">${coach.phone}</p>
    </div>
    <div class="section-title">О прототипе</div>
    <div class="card flag-muted">
      <p class="meta" style="line-height:1.6;">
        Это рабочий PWA-прототип кабинета тренера Digital Strong Abay.<br>
        Реальный backend (API, RLS, аудит) описан в Developer Implementation Pack v1.0 —
        здесь данные и сохранение посещаемости симулируются локально, в памяти браузера.
      </p>
    </div>
    <button class="btn btn-secondary" onclick="doLogout()">Выйти и сменить тренера (демо)</button>
  </div>

function render(){
  const root = document.getElementById('shell');
  if(state.screen==='landing'){ root.innerHTML = screenLanding(); return; }
  if(!state.authed){ root.innerHTML = screenLogin(); return; }
  if(state.screen==='dashboard')   root.innerHTML = screenDashboard();
  else if(state.screen==='groups')      root.innerHTML = screenGroups();
  else if(state.screen==='groupDetail') root.innerHTML = screenGroupDetail();
  else if(state.screen==='attendance')  root.innerHTML = screenAttendance();
  else if(state.screen==='profile')     root.innerHTML = screenProfile();
}

/* =========================================================
   ДЕЙСТВИЯ
   ========================================================= */
function goLanding(){ state.authed=false; state.coachId=null; state.groupId=null; state.sessionId=null; state.screen='landing'; render(); }
function goLoginFor(disciplineKey){
  const presetCoach = { greco_roman:2, freestyle:1, women_wrestling:1 }[disciplineKey] || 1;
  state.loginSelectedCoach = presetCoach;
  state.screen = 'login';
  render();
}
function selectDemoCoach(id){ state.loginSelectedCoach=id; render(); }
function doLogin(){ state.coachId=state.loginSelectedCoach; state.authed=true; state.screen='dashboard'; render(); }
function doLogout(){ goLanding(); }
function goTab(tab){ state.screen=tab; render(); }
function setGroupFilter(key){ state.groupFilter=key; render(); }
function openGroup(id){ state.groupId=id; state.screen='groupDetail'; render(); }
function openSession(id){ state.sessionId=id; state.screen='attendance'; render(); }

function toggleOnline(){
  state.online = !state.online;
  if(state.online && state.pendingSync>0){
    const n = state.pendingSync;
    setTimeout(()=>{ state.pendingSync=0; render(); showToast(`Синхронизировано: ${n} занятие(й) отправлено на сервер`); }, 900);
  }
  render();
}

function markAttendance(sessionId, athleteId, status){
  if(!state.attendance[sessionId]) state.attendance[sessionId] = {};
  state.attendance[sessionId][athleteId] = status;
  render();
}

function saveAttendance(sessionId){
  const draft = state.attendance[sessionId] || {};
  const g = GROUPS.find(g=>g.id===SESSIONS.find(s=>s.id===sessionId).groupId);
  const marked = Object.keys(draft).length;
  if(marked < g.athletes.length){
    showToast(`Отмечено ${marked} из ${g.athletes.length} — отметьте всех перед сохранением`);
    return;
  }
  if(state.online){
    showToast(`Посещаемость сохранена · ${marked} из ${g.athletes.length} отмечено`);
  } else {
    state.pendingSync += 1;
    showToast('Сохранено локально · синхронизируется при подключении к сети');
  }
  setTimeout(()=>openGroup(g.id), 650);
}

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),250); }, 2600);
}

/* =========================================================
   PWA: регистрация service worker (см. service-worker.js)
   ========================================================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{ /* офлайн-кеш недоступен в этом окружении — не блокирует прототип */ });
  });
}

render();
</script>
